<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <style>
      text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;}
      .title{fill:#1f2328;font-size:19px;font-weight:700;}
      .sub{fill:#656d76;font-size:13.5px;}
      .muted{fill:#656d76;font-size:12.5px;}
      .txt{fill:#1f2328;font-size:13px;}
      .h{fill:#1f2328;font-size:13.5px;font-weight:700;}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;fill:#1f2328;}
      .card{fill:#ffffff;stroke:#d0d7de;stroke-width:1.2;}
      .field{fill:#ffffff;stroke:#d0d7de;stroke-width:1.2;}
      .btn{fill:#1f883d;stroke:#1a7f37;stroke-width:1;}
      .btnt{fill:#ffffff;font-size:12.5px;font-weight:600;}
      .info{fill:#ddf4ff;stroke:#54aeff;stroke-width:1;}
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="429" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="40" class="title">Step 8 — Run the workflow</text>
  <text x="24" y="63" class="sub">Trigger it once by hand, then it repeats automatically every 6 hours.</text>

  <!-- app frame -->
  <rect x="24" y="84" width="712" height="324" rx="10" class="card"/>

  <!-- sidebar -->
  <path d="M25 94 q0 -9 9 -9 h182 v314 h-182 q-9 0 -9 -9 Z" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="44" y="120" class="h">Actions</text>
  <text x="44" y="150" class="muted">All workflows</text>
  <rect x="34" y="164" width="174" height="32" rx="6" fill="#ddf4ff"/>
  <rect x="34" y="164" width="3.5" height="32" fill="#0969da"/>
  <text x="48" y="185" fill="#0969da" font-size="11.5px" font-weight="600">Internetarchive-YouTube Sync</text>

  <!-- main: dispatch banner -->
  <rect x="232" y="110" width="486" height="46" rx="6" class="info"/>
  <circle cx="254" cy="133" r="9" fill="#0969da"/>
  <text x="254" y="138" text-anchor="middle" fill="#ffffff" font-size="13px" font-weight="700">i</text>
  <text x="272" y="138" class="txt">This workflow has a <tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-weight="700">workflow_dispatch</tspan> trigger.</text>
  <rect x="598" y="120" width="112" height="28" rx="6" class="btn"/>
  <text x="654" y="138" text-anchor="middle" class="btnt">Run workflow ▾</text>

  <!-- dropdown popover -->
  <path d="M650 156 l8 0 l-4 7 Z" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="556" y="168" width="170" height="118" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
  <text x="572" y="192" class="muted">Use workflow from</text>
  <rect x="572" y="202" width="138" height="30" rx="6" class="field"/>
  <text x="586" y="222" class="mono">Branch: main  ▾</text>
  <rect x="572" y="244" width="138" height="30" rx="6" class="btn"/>
  <text x="641" y="264" text-anchor="middle" class="btnt">Run workflow</text>

  <!-- caption -->
  <rect x="232" y="344" width="486" height="48" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.2"/>
  <text x="248" y="365" class="muted">Click <tspan fill="#1f2328" font-weight="700">Run workflow</tspan> to start now — or just wait for the</text>
  <text x="248" y="383" class="muted">scheduled run. Jobs resume automatically if they time out.</text>
</svg>
