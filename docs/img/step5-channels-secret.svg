<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <style>
      text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;}
      .title{fill:#1f2328;font-size:19px;font-weight:700;}
      .sub{fill:#656d76;font-size:13.5px;}
      .lbl{fill:#1f2328;font-size:13.5px;font-weight:600;}
      .req{fill:#cf222e;font-size:13.5px;}
      .muted{fill:#656d76;font-size:12.5px;}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;fill:#1f2328;}
      .crumb{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;fill:#656d76;}
      .card{fill:#ffffff;stroke:#d0d7de;stroke-width:1.2;}
      .panel{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1.2;}
      .field{fill:#ffffff;stroke:#d0d7de;stroke-width:1.2;}
      .btn{fill:#1f883d;stroke:#1a7f37;stroke-width:1;}
      .btnt{fill:#ffffff;font-size:13.5px;font-weight:600;}
      .callout{fill:#fff8c5;stroke:#d4a72c;stroke-width:1;}
      .callt{fill:#7d4e00;font-size:12.5px;font-weight:600;}
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="469" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="40" class="title">Step 5 — Add the channels you want to archive</text>
  <text x="24" y="63" class="sub">One secret named CHANNELS, with one "name: url" pair per line.</text>

  <rect x="24" y="82" width="712" height="34" rx="8" class="panel"/>
  <text x="40" y="104" class="crumb">Settings  ›  Secrets and variables  ›  Actions  ›  <tspan fill="#0969da" font-weight="700">New repository secret</tspan></text>

  <rect x="24" y="132" width="712" height="272" rx="10" class="card"/>

  <text x="44" y="168" class="lbl">Name <tspan class="req">*</tspan></text>
  <rect x="44" y="178" width="380" height="36" rx="6" class="field"/>
  <text x="58" y="201" class="mono">CHANNELS</text>

  <text x="44" y="248" class="lbl">Secret <tspan class="req">*</tspan></text>
  <rect x="44" y="258" width="668" height="86" rx="6" class="field"/>
  <text x="58" y="286" class="mono">h3podcast: https://www.youtube.com/c/H3Podcast</text>
  <text x="58" y="314" class="mono">Destiny: https://www.youtube.com/user/destiny</text>

  <rect x="44" y="360" width="104" height="34" rx="6" class="btn"/>
  <text x="96" y="382" text-anchor="middle" class="btnt">Add secret</text>

  <!-- format rule callout -->
  <rect x="24" y="418" width="712" height="44" rx="8" class="callout"/>
  <text x="40" y="438" class="callt">Format:  CHANNEL_NAME: CHANNEL_URL</text>
  <text x="40" y="456" class="callt">Exactly one space after the colon, and no quotes around the name or URL.</text>
</svg>
