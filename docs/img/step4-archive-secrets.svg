<svg viewBox="0 0 760 426" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <style>
      text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;}
      .title{fill:#1f2328;font-size:19px;font-weight:700;}
      .sub{fill:#656d76;font-size:13.5px;}
      .lbl{fill:#1f2328;font-size:13.5px;font-weight:600;}
      .req{fill:#cf222e;font-size:13.5px;}
      .muted{fill:#656d76;font-size:12.5px;}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;fill:#1f2328;}
      .crumb{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;fill:#656d76;}
      .card{fill:#ffffff;stroke:#d0d7de;stroke-width:1.2;}
      .panel{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1.2;}
      .field{fill:#ffffff;stroke:#d0d7de;stroke-width:1.2;}
      .ph{fill:#8c959f;font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
      .btn{fill:#1f883d;stroke:#1a7f37;stroke-width:1;}
      .btnt{fill:#ffffff;font-size:13.5px;font-weight:600;}
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="425" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="40" class="title">Step 4 — Add your Archive.org credentials as secrets</text>
  <text x="24" y="63" class="sub">In your fork, secrets live under the repository Settings.</text>

  <!-- breadcrumb -->
  <rect x="24" y="82" width="712" height="34" rx="8" class="panel"/>
  <text x="40" y="104" class="crumb">Settings  ›  Secrets and variables  ›  Actions  ›  <tspan fill="#0969da" font-weight="700">New repository secret</tspan></text>

  <!-- form card -->
  <rect x="24" y="132" width="712" height="220" rx="10" class="card"/>

  <text x="44" y="168" class="lbl">Name <tspan class="req">*</tspan></text>
  <rect x="44" y="178" width="380" height="36" rx="6" class="field"/>
  <text x="58" y="201" class="mono">ARCHIVE_USER_EMAIL</text>

  <text x="44" y="248" class="lbl">Secret <tspan class="req">*</tspan></text>
  <rect x="44" y="258" width="668" height="56" rx="6" class="field"/>
  <text x="58" y="282" class="mono">you@example.com</text>

  <rect x="44" y="330" width="104" height="34" rx="6" class="btn"/>
  <text x="96" y="352" text-anchor="middle" class="btnt">Add secret</text>
  <text x="166" y="352" class="muted">Then add a second secret the same way — see below.</text>

  <!-- repeat callout -->
  <rect x="24" y="372" width="712" height="44" rx="8" class="panel"/>
  <text x="40" y="391" class="muted">Add two secrets here:</text>
  <text x="178" y="391" class="mono" font-weight="700">ARCHIVE_USER_EMAIL</text>
  <text x="338" y="391" class="muted">and</text>
  <text x="372" y="391" class="mono" font-weight="700">ARCHIVE_PASSWORD</text>
  <text x="40" y="409" class="muted">— your Internet Archive login email and password.</text>
</svg>
